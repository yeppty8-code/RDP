name: Windows-RDP-Cloudflare
on: 
  workflow_dispatch: # Manual trigger from the "Actions" tab

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Cloudflared
      run: |
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

    - name: Enable Remote Desktop
      run: |
        # 1. Enable RDP in Registry (Force)
        reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        
        # 2. Allow through Firewall
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # 3. Set Password (ignoring errors if user/group already exists)
        net user runneradmin MySecurePass123! /add || echo "User exists"
        net localgroup administrators runneradmin /add || echo "Already admin"
        
        # 4. Disable password length/complexity prompts
        reg add "HKLM\Software\Microsoft\Windows\CurrentVersion\Policies\System" /v ConsentPromptBehaviorAdmin /t REG_DWORD /d 0 /f

    - name: Start Tunnel and Keep Alive
      run: |
        # Start cloudflared as a background process so the script can continue to the loop
        Start-Process ./cloudflared.exe -ArgumentList "tunnel run --token ${{ secrets.CLOUDFLARE_TOKEN }}"
        
        Write-Host "Tunnel is running. You can now connect via RDP."
        Write-Host "Username: runneradmin"
        Write-Host "Password: MySecurePass123!"
        
        # Keep the VM alive for 6 hours (GitHub's max limit)
        $i = 0; while($i -le 360) { Sleep 60; $i++ }
