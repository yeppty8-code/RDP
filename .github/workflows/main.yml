name: GitHub-Created-Tunnel
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Install Cloudflared
      run: |
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

    - name: Enable RDP
      run: |
        reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin MySecurePass123! /add || echo "User exists"
        net localgroup administrators runneradmin /add || echo "Already admin"

    - name: Create and Start Tunnel
      run: |
        # 1. Authenticate (This usually requires a login, but we use a Tunnel Secret)
        # 2. Create the tunnel named 'github-vm'
        ./cloudflared.exe tunnel create github-vm
        
        # 3. Route the tunnel to a hostname (e.g., rdp.yourdomain.com)
        ./cloudflared.exe tunnel route dns github-vm rdp.yourdomain.com
        
        # 4. Run the tunnel pointing to RDP port
        Start-Process ./cloudflared.exe -ArgumentList "tunnel run --url rdp://localhost:3389 github-vm"
        
        Write-Host "GitHub has created the tunnel."
        $i = 0; while($i -le 360) { Sleep 60; $i++ }
      env:
        CLOUDFLARE_TUNNEL_PASSWORD: ${{ secrets.TUNNEL_PASSWORD }}
